upstream web_server {
    server web:8000;
}

# Use the tunnel's X-Forwarded-Proto when present, otherwise fall back to the
# scheme nginx itself saw. Prevents an empty header from confusing Django's
# SECURE_PROXY_SSL_HEADER detection.
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    server_name phytosynergydb.in www.phytosynergydb.in 192.168.1.35 localhost;

    client_max_body_size 50M;

    # --- Compression ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json application/xml
        image/svg+xml;

    # --- Security headers ---
    # Note: HSTS is intentionally NOT set here. It is controlled by Django
    # (SECURE_HSTS_SECONDS) so it can be enabled only on a dedicated domain.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    # Hide the nginx version in the Server header.
    server_tokens off;

    location / {
        proxy_pass http://web_server;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Preserve the original scheme reported by the tunnel (ngrok/Cloudflare
        # set X-Forwarded-Proto=https); fall back to nginx's own scheme.
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }
}
