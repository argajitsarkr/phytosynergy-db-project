version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=phytosynergy_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=E6fgO4KM7xDkXbysGVLhFEflgZuEZu14xKoBxh5G7FA
    restart: always

  web:
    build: .
    volumes:
      - static_volume:/app/staticfiles
    expose:
      - 8000
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgres://postgres:E6fgO4KM7xDkXbysGVLhFEflgZuEZu14xKoBxh5G7FA@db:5432/phytosynergy_db
      - DJANGO_SECRET_KEY=aky@!o6_4fyp%ox59q^xfe0*#^6n83(dz)rjs!c34j-+ul3%u^
      - DEBUG=0
      - ALLOWED_HOSTS=phytosynergydb.in,www.phytosynergydb.in,192.168.1.35,localhost,127.0.0.1
      - CSRF_TRUSTED_ORIGINS=https://phytosynergydb.in,https://www.phytosynergydb.in
      - SECURE_HSTS_SECONDS=31536000
      - SECURE_HSTS_INCLUDE_SUBDOMAINS=1
    restart: always

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
    depends_on:
      - web
    restart: always

volumes:
  postgres_data:
  static_volume: